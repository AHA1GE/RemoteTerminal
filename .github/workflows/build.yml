name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { os: windows,  arch: amd64, goos: windows, ext: .exe }
          - { os: windows,  arch: arm64, goos: windows, ext: .exe }
          - { os: linux,    arch: amd64, goos: linux,   ext: '' }
          - { os: linux,    arch: arm64, goos: linux,   ext: '' }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Tidy modules
        run: go mod tidy

      - name: Vet
        run: go vet ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          BINARY="RT${{ matrix.ext }}"
          go build -ldflags="-s -w -X main.version=${GITHUB_REF_NAME:-dev}" -o "$BINARY" ./cmd/remote-terminal/

      - name: Verify binary
        shell: bash
        run: |
          BINARY="RT${{ matrix.ext }}"
          if [ ! -f "$BINARY" ]; then
            echo "ERROR: Binary not found: $BINARY"
            exit 1
          fi
          echo "Binary built: $BINARY"
          ls -lh "$BINARY"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RT-${{ matrix.goos }}-${{ matrix.arch }}
          path: RT${{ matrix.ext }}
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cd artifacts
          for dir in RT-*; do
            ARCH="${dir#RT-windows-}"
            ARCH="${ARCH#RT-linux-}"
            if [[ "$dir" == *windows* ]]; then
              cp "$dir/RT.exe" "../release/RT-windows-${ARCH}.exe"
            else
              cp "$dir/RT" "../release/RT-linux-${ARCH}"
            fi
          done
          cd ../release
          ls -lh
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
