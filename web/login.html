<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Remote Terminal — Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f0f2f5; color: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  form { background: #fff; padding: 2rem; border-radius: 8px; width: 320px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  h1 { font-size: 1.25rem; text-align: center; margin-bottom: 1.5rem; color: #0066cc; }
  label { display: block; font-size: 0.85rem; margin-bottom: 0.25rem; color: #555; }
  input { width: 100%; padding: 0.6rem; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 4px; background: #fff; color: #1a1a2e; font-size: 1rem; outline: none; }
  input:focus { border-color: #0066cc; box-shadow: 0 0 0 2px rgba(0,102,204,0.15); }
  button { width: 100%; padding: 0.6rem; border: none; border-radius: 4px; background: #0066cc; color: #fff; font-size: 1rem; cursor: pointer; }
  button:hover { background: #0052a3; }
  .error { color: #c41a16; font-size: 0.85rem; margin-bottom: 0.5rem; display: none; }
</style>
</head>
<body>
<form id="login-form">
  <h1>Remote Terminal</h1>
  <label for="password">Passcode</label>
  <input type="password" id="password" name="password" autocomplete="current-password" required>
  <input type="hidden" id="csrf-token" name="csrf_token">
  <div class="error" id="error"></div>
  <button type="submit">Login</button>
</form>
<script src="/app.js"></script>
</body>
</html>
