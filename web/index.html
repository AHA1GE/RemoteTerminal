<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Remote Terminal — Sessions</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; padding: 1rem; }
  h1 { font-size: 1.25rem; margin-bottom: 1rem; color: #e94560; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
  th, td { padding: 0.5rem; text-align: left; border-bottom: 1px solid #333; }
  th { font-size: 0.8rem; color: #aaa; }
  td a { color: #e94560; text-decoration: none; }
  td a:hover { text-decoration: underline; }
  button { padding: 0.5rem 1rem; border: none; border-radius: 4px; background: #e94560; color: #fff; font-size: 0.9rem; cursor: pointer; margin-right: 0.5rem; }
  .actions button.delete { background: #555; }
  #no-sessions { color: #aaa; font-style: italic; }
</style>
</head>
<body>
<h1>Remote Terminal — Sessions</h1>
<table id="sessions-table">
  <thead>
    <tr><th>Session</th><th>Created</th><th>Last Activity</th><th>Status</th><th></th></tr>
  </thead>
  <tbody id="sessions-body">
  </tbody>
</table>
<p id="no-sessions">No active sessions.</p>
<div class="actions">
  <button id="new-session">New Session</button>
  <button id="logout" class="delete">Logout</button>
</div>
<script src="app.js"></script>
</body>
</html>
