# Remote Terminal configuration
# Copy this file to the same directory as the binary and rename to config.yaml

listen: 127.0.0.1:8443

# Set your password here (plaintext). The first time you start the binary, it
# will hash this value, write it to password_hash, and remove password_text.
# To change your password later, add password_text back and restart.
password_text:

# Argon2id password hash (set automatically from password_text on first run).
password_hash: <argon2id>

# Default command launched in new PTY sessions
default_command:
  - powershell.exe

# Maximum concurrent PTY sessions
max_sessions: 32

# Ring buffer size per session in bytes (1 MB default)
buffer_size: 1048576

# Log level: debug, error, none
log_level: debug
